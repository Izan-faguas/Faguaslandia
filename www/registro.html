<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - Faguáslandia</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<header>
    <nav class="menu">
        <a href="index.html">Biblioteca</a>
        <a href="tienda.html">Tienda</a>
        <a href="perfil.html">Perfil</a>
        <a href="registro.html">Registro</a>
        <a href="login.html">Iniciar sesión</a>
    </nav>
    <script type="module">
        import { getSessionUser, logout } from "./session.js";

        const menu = document.querySelector(".menu");

        const usuario = await getSessionUser();

        if (usuario) {

            // quitar login/registro
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="logoutBtn">Cerrar sesión</a>
            `;

            document.getElementById("logoutBtn").onclick = logout;

        } else {

            // usuario no logueado
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Iniciar sesión</a>
            `;
        }
    </script>
</header>   

<div class="formulario">
    <form id="registroForm">
        <h2>Registro de Usuario</h2>
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="email" name="email" placeholder="Correo" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Registrar</button>
        <div class="mensaje" id="mensaje"></div>
    </form>
</div>

<script type="module">
import CONFIG from "./config.js";

const form = document.getElementById('registroForm');
const mensajeDiv = document.getElementById('mensaje');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    try {
        const response = await fetch(`${CONFIG.API_BASE_URL}/usuarios/crear`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
        credentials: 'include' 
        });

        const result = await response.json();

        if (!response.ok) {
            throw new Error(result.message || "Error al registrar usuario");
        }

        mensajeDiv.textContent = `Usuario ${result.nombre} registrado correctamente`;
        mensajeDiv.style.color = 'lime';
        form.reset();

    } catch (error) {
        mensajeDiv.textContent = error.message;
        mensajeDiv.style.color = 'red';
    }
});
</script>

</body>
</html>
