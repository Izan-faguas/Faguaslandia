<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Registro - Faguáslandia</title>
</head>

<body>

<header>
    <nav class="menu">
        <a href="index.html">Biblioteca</a>
        <a href="tienda.html">Tienda</a>
        <a href="perfil.html">Perfil</a>
        <a href="registro.html">Registro</a>
    </nav>
</header>   

<div class="formulario">
    <form id="registroForm">
        <h2>Registro de Usuario</h2>
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="email" name="email" placeholder="Correo" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Registrar</button>
        <div class="mensaje" id="mensaje"></div>
    </form>
</div>

<script type="module">
    import CONFIG from "./config.js";

    const form = document.getElementById('registroForm');
    const mensajeDiv = document.getElementById('mensaje');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch(`${CONFIG.API_BASE_URL}/usuarios/crear`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                throw new Error('Error al registrar usuario');
            }

            const result = await response.json();
            mensajeDiv.textContent = `Usuario ${result.nombre} registrado correctamente`;
            mensajeDiv.style.color = 'lime';
            form.reset();

        } catch (error) {
            mensajeDiv.textContent = error.message;
            mensajeDiv.style.color = 'red';
        }
    });
</script>

</body>
</html>
