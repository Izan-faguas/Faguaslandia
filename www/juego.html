<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

<header>
  <nav class="menu">
        <a href="index.html">Biblioteca</a>
        <a href="tienda.html">Tienda</a>
        <a href="perfil.html">Perfil</a>
        <a href="registro.html">Registro</a>
        <a href="login.html">Iniciar sesión</a>
    </nav>
    <script type="module">
        import { getSessionUser, logout } from "./session.js";

        const menu = document.querySelector(".menu");

        const usuario = await getSessionUser();

        if (usuario) {

            // quitar login/registro
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="logoutBtn">Cerrar sesión</a>
            `;

            document.getElementById("logoutBtn").onclick = logout;

        } else {

            // usuario no logueado
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Iniciar sesión</a>
            `;
        }
    </script>
</header>


<main id="juegoContainer"></main>

<script type="module">
    
import CONFIG from "./config.js";

const container = document.getElementById("juegoContainer");

// 🔍 obtener id de la URL
const params = new URLSearchParams(window.location.search);
const juegoId = params.get("id");

async function cargarJuego() {
  try {
    const res = await fetch(`${CONFIG.API_BASE_URL}/juegos/${juegoId}`);
    const juego = await res.json();
    console.log(juego);

    container.innerHTML = `
  <div class="game-page">

    <!-- HERO -->
    <div class="game-hero">
      <img src="${juego.imagen_url ?? 'default.png'}">
      <div class="game-overlay"></div>
      <h1>${juego.titulo}</h1>
    </div>

    <!-- CONTENIDO -->
    <div class="game-content">

      <!-- IZQUIERDA -->
      <div class="game-left">
        <img src="${juego.imagen_url ?? 'default.png'}" class="game-main-img">

        <p class="game-desc">
          ${juego.descripcion ?? 'Sin descripción'}
        </p>
      </div>

      <!-- DERECHA -->
      <div class="game-right">
        <div class="game-card">

          <h3 class="price">
            ${juego.precio ? juego.precio + "€" : "Gratis"}
          </h3>

          <button id="comprarBtn">Comprar</button>

        </div>
      </div>

    </div>

  </div>
`;

  } catch (e) {
    container.innerHTML = "Error cargando juego";
  }
}

async function comprar() {
  try {
    const res = await fetch(`${CONFIG.API_BASE_URL}/compras`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "include", 
      body: JSON.stringify({
        juegoId: juegoId
      })
    });

    if (res.status === 401) {
      alert("Tienes que iniciar sesión");
      return;
    }

    if (!res.ok) throw new Error();

    alert("Juego comprado ✅");

  } catch {
    alert("Error al comprar");
  }
}

cargarJuego();
</script>

</body>
</html>
