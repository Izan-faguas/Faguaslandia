<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

<header>
  <nav class="menu"></nav>

  <script type="module">
    import { getSessionUser, logout } from "./session.js";

    const menu = document.querySelector(".menu");
    const usuario = await getSessionUser();

    if (usuario) {
      menu.innerHTML = `
        <a href="index.html">Biblioteca</a>
        <a href="tienda.html">Tienda</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" id="logoutBtn">Cerrar sesión</a>
      `;
      document.getElementById("logoutBtn").onclick = logout;
    } else {
      menu.innerHTML = `
        <a href="index.html">Biblioteca</a>
        <a href="tienda.html">Tienda</a>
        <a href="registro.html">Registro</a>
        <a href="login.html">Iniciar sesión</a>
      `;
    }
  </script>
</header>

<main id="juegoContainer"></main>

<script type="module">
import CONFIG from "./config.js";

const container = document.getElementById("juegoContainer");

// obtener id
const params = new URLSearchParams(window.location.search);
const juegoId = params.get("id");

if (!juegoId) {
  container.innerHTML = "Juego no encontrado";
}

/* =========================
   CARGAR JUEGO
========================= */
async function cargarJuego() {
  try {

    // 1️⃣ obtener datos del juego
    const res = await fetch(`${CONFIG.API_BASE_URL}/juegos/${juegoId}`);

    if (!res.ok) throw new Error();

    const juego = await res.json();

    // 2️⃣ comprobar si el usuario lo tiene
    let comprado = false;

    try {
      const resCompra = await fetch(
        `${CONFIG.API_BASE_URL}/compras/juego/${juegoId}`,
        {
          credentials: "include"
        }
      );

      if (resCompra.ok) {
        comprado = await resCompra.json();
      }

    } catch (e) {
      console.error("Error comprobando compra", e);
    }

    // 3️⃣ render UI
    container.innerHTML = `
      <div class="game-page">

        <!-- HERO -->
        <div class="game-hero">
          <img src="${juego.imagen_url ?? 'default.png'}">
          <div class="game-overlay"></div>
          <h1>${juego.titulo}</h1>
        </div>

        <!-- CONTENIDO -->
        <div class="game-content">

          <!-- IZQUIERDA -->
          <div class="game-left">
            <img src="${juego.imagen_url ?? 'default.png'}" class="game-main-img">
          </div>

          <!-- DERECHA -->
          <div class="game-right">

            <!-- DESCRIPCIÓN -->
            <div class="game-card">
              <h2>Sobre el juego</h2>
              <p class="game-desc">
                ${juego.descripcion ?? 'Sin descripción'}
              </p>
            </div>

            <!-- COMPRA -->
            <div class="game-card">
              <h3 class="price">
                ${juego.precio ? juego.precio + "€" : "Gratis"}
              </h3>

              <button id="comprarBtn" ${comprado ? "disabled" : ""}>
                ${comprado ? "Comprado ✔" : "Comprar"}
              </button>
            </div>

            <!-- INFO -->
            <div class="game-card info">
              <p><strong>Categoría:</strong> ${juego.categoria ?? "No definida"}</p>
              <p><strong>Desarrollador:</strong> ${juego.desarrollador ?? "Desconocido"}</p>
              <p><strong>Fecha:</strong> ${juego.fecha_lanzamiento ?? "???"}</p>
              <p><strong>Valoración:</strong> ⭐ ${juego.valoracion_promedio ?? "0"}</p>
            </div>

          </div>

        </div>

      </div>
    `;

    // 4️⃣ lógica botón
    const btn = document.getElementById("comprarBtn");

    if (comprado) {
      btn.style.opacity = "0.5";
      btn.style.cursor = "not-allowed";
    } else {
      btn.onclick = comprar;
    }

  } catch (e) {
    container.innerHTML = "Error cargando juego";
  }
}

/* =========================
   COMPRAR
========================= */
async function comprar() {
  try {
    const res = await fetch(`${CONFIG.API_BASE_URL}/compras`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "include",
      body: JSON.stringify({ juegoId })
    });

    if (res.status === 401) {
      alert("Tienes que iniciar sesión");
      return;
    }

    if (!res.ok) throw new Error();

    alert("Juego comprado ✅");

    // recargar página para actualizar botón
    location.reload();

  } catch {
    alert("Error al comprar");
  }
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", cargarJuego);
</script>

</body>
</html>
