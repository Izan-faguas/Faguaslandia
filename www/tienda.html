<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Faguáslandia</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

<header>
  <nav class="menu">
        <a href="index.html">Biblioteca</a>
        <a href="tienda.html">Tienda</a>
        <a href="perfil.html">Perfil</a>
        <a href="registro.html">Registro</a>
        <a href="login.html">Iniciar sesión</a>
    </nav>
    <script type="module">
        import { getSessionUser, logout } from "./session.js";

        const menu = document.querySelector(".menu");

        const usuario = await getSessionUser();

        if (usuario) {

            // quitar login/registro
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="logoutBtn">Cerrar sesión</a>
            `;

            document.getElementById("logoutBtn").onclick = logout;

        } else {

            // usuario no logueado
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Iniciar sesión</a>
            `;
        }
    </script>
</header>

<main class="tienda">
  <div class="buscador">

    <input type="text" id="busqueda" placeholder="Buscar juego...">

    <select id="filtroCategoria">
      <option value="">Todas las categorías</option>
    </select>

    <select id="filtroPrecio">
      <option value="">Cualquier precio</option>
      <option value="gratis">Gratis</option>
      <option value="0-10">0€ - 10€</option>
      <option value="10-30">10€ - 30€</option>
      <option value="30+">30€+</option>
    </select>

  </div>
  <section id="listaJuegos" class="juegos-grid"></section>

</main>

<script type="module">
  import CONFIG from "./config.js";

  const listaJuegosDiv = document.getElementById("listaJuegos");

  const inputBusqueda = document.getElementById("busqueda");
  const filtroCategoria = document.getElementById("filtroCategoria");
  const filtroPrecio = document.getElementById("filtroPrecio");

  let juegosGlobal = [];

  // 🎮 cargar juegos
  async function cargarJuegos() {
    try {
      const response = await fetch(`${CONFIG.API_BASE_URL}/juegos`);
      if (!response.ok) throw new Error("No se pudieron cargar los juegos");

      juegosGlobal = await response.json();

      cargarCategorias(juegosGlobal);
      mostrarJuegos(juegosGlobal);

    } catch (error) {
      listaJuegosDiv.textContent = error.message;
    }
  }

  // 📂 rellenar categorías dinámicamente
  function cargarCategorias(juegos) {
    const categorias = [...new Set(juegos.map(j => j.categoria))];

    categorias.forEach(cat => {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      filtroCategoria.appendChild(option);
    });
  }

  // 🎨 render juegos
  function mostrarJuegos(juegos) {
    listaJuegosDiv.innerHTML = "";

    juegos.forEach(juego => {
      const juegoSection = document.createElement("section");
      juegoSection.className = "hero juego";

      juegoSection.innerHTML = `
        <div class="hero-media">
          <img src="${juego.imagen_url ?? 'default.png'}">
        </div>

        <div class="hero-info">
          <h2>${juego.titulo}</h2>
          <p>${juego.descripcion ?? 'Sin descripción'}</p>

          <div class="hero-price">
            <span class="price">
              ${juego.precio ? juego.precio + '€' : 'Gratis'}
            </span>
          </div>
        </div>
      `;

      juegoSection.onclick = () => {
        window.location.href = `juego.html?id=${juego.id}`;
      };

      listaJuegosDiv.appendChild(juegoSection);
    });
  }

  // 🔍 FILTRADO
  function filtrar() {
    const texto = inputBusqueda.value.toLowerCase();
    const categoria = filtroCategoria.value;
    const precio = filtroPrecio.value;

    let filtrados = juegosGlobal.filter(juego => {

      // nombre
      const coincideTexto =
        juego.titulo.toLowerCase().includes(texto) ||
        juego.descripcion.toLowerCase().includes(texto);

      // categoría
      const coincideCategoria =
        !categoria || juego.categoria === categoria;

      // precio
      let coincidePrecio = true;

      if (precio === "gratis") {
        coincidePrecio = !juego.precio;
      } else if (precio === "0-10") {
        coincidePrecio = juego.precio <= 10;
      } else if (precio === "10-30") {
        coincidePrecio = juego.precio > 10 && juego.precio <= 30;
      } else if (precio === "30+") {
        coincidePrecio = juego.precio > 30;
      }

      return coincideTexto && coincideCategoria && coincidePrecio;
    });

    mostrarJuegos(filtrados);
  }

  // 🎧 eventos
  inputBusqueda.addEventListener("input", filtrar);
  filtroCategoria.addEventListener("change", filtrar);
  filtroPrecio.addEventListener("change", filtrar);

  document.addEventListener("DOMContentLoaded", cargarJuegos);
</script>

</body>
</html>
