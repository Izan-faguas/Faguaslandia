<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Faguáslandia</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

<header>
  <nav class="menu">
      <a href="index.html">Biblioteca</a>
      <a href="tienda.html">Tienda</a>
      <a href="perfil.html">Perfil</a>
      <a href="registro.html">Registro</a>
      <a href="login.html">Iniciar sesión</a>
  </nav>
</header>

<main class="tienda">
  <!-- LISTA DE JUEGOS -->
  <section id="listaJuegos" class="juegos-grid"></section>

</main>

<script type="module">
  import CONFIG from "./config.js";

  const listaJuegosDiv = document.getElementById("listaJuegos");

  async function cargarJuegos() {
    try {
      const response = await fetch(`${CONFIG.API_BASE_URL}/juegos`);
      if (!response.ok) throw new Error("No se pudieron cargar los juegos");

      const juegos = await response.json();
      listaJuegosDiv.innerHTML = "";

      juegos.forEach((juego, index) => {
        const juegoSection = document.createElement("section");
        juegoSection.className = "hero juego";

        juegoSection.innerHTML = `
          <div class="hero-media">
            <img src="${juego.imagen_url ?? 'default.png'}" alt="${juego.titulo}">
          </div>

          <div class="hero-info">
            <h2>${juego.titulo}</h2>
            <p>${juego.descripcion ?? 'Sin descripción'}</p>

            <div class="hero-thumbs">
              <img src="${juego.imagen_url ?? 'default.png'}">
              <img src="${juego.imagen_url ?? 'default.png'}">
            </div>

            <div class="hero-price">
              <span class="price">
                ${juego.precio ? juego.precio + '€' : 'Gratis'}
              </span>
            </div>
          </div>
        `;

        listaJuegosDiv.appendChild(juegoSection);
      });

    } catch (error) {
      listaJuegosDiv.textContent = error.message;
    }
  }

  document.addEventListener("DOMContentLoaded", cargarJuegos);
</script>

</body>
</html>
