<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Faguáslandia</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
  <nav class="menu_tienda">
    <a href="index.html">Biblioteca</a>
    <a href="tienda.html">Tienda</a>
    <a href="perfil.html">Perfil</a>
  </nav>
</header>

<main class="tienda">

  <!-- JUEGO DESTACADO -->
  <section class="hero">
    <div class="hero-media">
      <img src="algo.png" alt="Juego destacado">
    </div>

    <div class="hero-info">
      <h2>Mini Golf</h2>
      <p>
        Un juego de minigolf relajante en 2D donde la paciencia
        y la precisión lo son todo.
      </p>

      <div class="hero-thumbs">
        <img src="algo.png">
        <img src="algo.png">
        <img src="algo.png">
        <img src="algo.png">
      </div>

      <div class="hero-price">
        <span class="discount">-40%</span>
        <span class="price">4,99€</span>
      </div>
    </div>
  </section>

  <!-- LISTA DE JUEGOS -->
  <section id="listaJuegos"></section>

</main>

<script type="module">
  import CONFIG from "./config.js";

  const listaJuegosDiv = document.getElementById('listaJuegos');

  async function cargarJuegos() {
    try {
      const response = await fetch(`${CONFIG.API_BASE_URL}/juegos`);

      if (!response.ok) {
        throw new Error('No se pudieron cargar los juegos');
      }

      const juegos = await response.json();

      if (!juegos || juegos.length === 0) {
        listaJuegosDiv.textContent = 'No hay juegos disponibles';
        return;
      }

      listaJuegosDiv.innerHTML = '';

      const contenedor = document.createElement('div');
      contenedor.className = 'juegos-contenedor';

      juegos.forEach(juego => {
        const tarjeta = document.createElement('div');
        tarjeta.className = 'juego-tarjeta';

        tarjeta.innerHTML = `
          <img src="${juego.imagen_url ?? 'default.png'}" alt="${juego.titulo}">
          <h3>${juego.titulo}</h3>
          <p>${juego.descripcion ?? 'Sin descripción'}</p>
          <p class="precio">${juego.precio ? juego.precio + '€' : 'Gratis'}</p>
        `;

        contenedor.appendChild(tarjeta);
      });

      listaJuegosDiv.appendChild(contenedor);

    } catch (error) {
      listaJuegosDiv.textContent = error.message;
      listaJuegosDiv.style.color = 'red';
    }
  }

  document.addEventListener('DOMContentLoaded', cargarJuegos);
</script>


</body>
</html>
