<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Faguáslandia</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <nav class="menu">
            <a href="index.html">Biblioteca</a>
            <a href="tienda.html">Tienda</a>
            <a href="perfil.html">Perfil</a>
            <a href="registro.html">Registro</a>
        </nav>
    </header>

    <div class="formulario">
        <form id="loginForm">
            <h2>Iniciar sesión</h2>
            <label for="nombre">Usuario:</label>
            <input type="text" name="nombre" id="nombre" required>
            <label for="password">Contraseña:</label>
            <input type="password" name="password" id="password" required>
            <button type="submit">Entrar</button>
        </form>
        </div>

    <div id="mensaje"></div>

    <script src="login.js"></script>
    <script>
const form = document.getElementById('loginForm');
const mensajeDiv = document.getElementById('mensaje');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    try {
        const response = await fetch('http://192.168.1.159:8081/usuarios/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        // Si no responde OK (200)
        if (!response.ok) {
            throw new Error('Usuario o contraseña incorrectos');
        }

        // Si llega aquí, el login fue exitoso
        const usuario = await response.json();

        // ✅ Mostrar mensaje
        mensajeDiv.textContent = `Bienvenido, ${usuario.nombre}!`;
        mensajeDiv.style.color = 'lime';

        // ✅ Guardar sesión localmente (opcional)
        localStorage.setItem('usuario', JSON.stringify(usuario));

        // ✅ Redirigir tras un pequeño delay (1.5s)
        setTimeout(() => {
            window.location.href = 'perfil.html';  // o la página que quieras
        }, 1500);

    } catch (error) {
        mensajeDiv.textContent = error.message;
        mensajeDiv.style.color = 'red';
    }
});
</script>

</body>
</html>
