<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Faguáslandia</title>
</head>

<body data-theme="default">

<header>
  <nav class="menu">
      <a href="index.html">Biblioteca</a>
      <a href="tienda.html">Tienda</a>
      <a href="perfil.html">Perfil</a>
      <a href="registro.html">Registro</a>
      <a href="login.html">Iniciar sesión</a>
  </nav>
      <script type="module">
        import { getSessionUser, logout } from "./session.js";

        const menu = document.querySelector(".menu");

        const usuarioo = await getSessionUser();

        if (usuarioo) {

            // quitar login/registro
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="logoutBtn">Cerrar sesión</a>
            `;

            document.getElementById("logoutBtn").onclick = logout;

        } else {

            // usuario no logueado
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Iniciar sesión</a>
            `;
        }
    </script>
</header>
<main>
  <div class="perfil">

    <div class="perfil-banner">
  <div class="perfil-overlay"></div>
</div>

<div class="perfil-header">
  <img id="fotoPerfil" src="img/default.png" class="avatar">

  <div class="perfil-nombre">
    <h1 id="nombreUsuario">Cargando...</h1>
    <span class="nivel">Nivel 7</span>
  </div>
</div>

    <div class="perfil-body">

      <div class="perfil-info">
        <p><strong>Correo:</strong> <span id="emailUsuario"></span></p>
        <p><strong>Código amigo:</strong> 
          <span id="nombreAmigo"></span>#<span id="idAmigo"></span>
        </p>

        <button id="editarPerfilBtn" class="btnEditar">Editar perfil</button>
      </div>

      <div class="perfil-stats">

        <div class="stat-card">
          <h3>🎮 Juegos</h3>
          <p>12</p>
        </div>

        <div class="stat-card">
          <h3>⏱️ Horas</h3>
          <p>245h</p>
        </div>

        <div class="stat-card">
          <h3>🏆 Logros</h3>
          <p>34</p>
        </div>

      </div>

    </div> <!-- 👈 CIERRE IMPORTANTE -->  
    <div class="perfil-amigos">

      <h2>👥 Amigos</h2>

      <div class="agregar-amigo">
      <input type="text" id="codigoAmigo" placeholder="Código amigo">        
      <button id="btnAgregarAmigo">Enviar solicitud</button>
      </div>

      <h3>Solicitudes pendientes</h3>
      <div id="listaSolicitudes"></div>

      <h3>Lista de amigos</h3>
      <div id="listaAmigos"></div>

    </div>

  </div> <!-- 👈 CIERRE IMPORTANTE -->
</main>

<div id="editarPerfilModal">
  <div class="modal-content">
    <h2>Editar Perfil</h2>

    <label>Nombre</label>
    <input type="text" id="editarNombre">

    <label>Correo</label>
    <input type="text" id="editarCorreo">

    <label>Foto</label>
    <input type="file" id="editarFoto">

    <button id="guardarCambios">Guardar</button>
    <button id="cerrarModal">Cancelar</button>
  </div>
</div>

<script type="module">
import CONFIG from "./config.js";

let usuario = null;

async function cargarPerfil(){

    try{

        const res = await fetch(`${CONFIG.API_BASE_URL}/auth/me`,{
            method:"GET",
            credentials:"include"
        });

        if(res.status === 401){
            window.location.href="login.html";
            return;
        }

        usuario = await res.json();

        document.getElementById("nombreUsuario").textContent = usuario.nombre;
        document.getElementById("emailUsuario").textContent = usuario.email;
        document.getElementById("nombreAmigo").textContent = usuario.nombre;
        document.getElementById("idAmigo").textContent = usuario.id;

        const fotoPerfil = document.getElementById("fotoPerfil");

        fotoPerfil.src = usuario.foto
            ? `${CONFIG.API_BASE_URL}/uploads/${usuario.foto}`
            : "img/default.png";

    }catch(error){

        console.error("Error cargando sesión:", error);
        window.location.href="login.html";

    }
}

async function cargarSolicitudes() {
      const res = await fetch(
          `${CONFIG.API_BASE_URL}/usuarios/${usuario.id}/solicitudes`
      );

      const solicitudes = await res.json();

      const contenedor = document.getElementById("listaSolicitudes");
      contenedor.innerHTML = "";

      solicitudes.forEach(sol => {
          contenedor.innerHTML += `
              <div class="solicitud-item">
                  <span>${sol.usuario1.nombre}</span>
                  <button onclick="aceptarSolicitud(${sol.id})">
                      Aceptar
                  </button>
              </div>
          `;
      });
  }
  async function cargarAmigos() {
    const res = await fetch(
        `${CONFIG.API_BASE_URL}/usuarios/${usuario.id}/amigos`
    );

    const amigos = await res.json();

    const contenedor = document.getElementById("listaAmigos");
    contenedor.innerHTML = "";

    amigos.forEach(amigo => {
        const nombre =
            amigo.usuario1.id === usuario.id
                ? amigo.usuario2.nombre
                : amigo.usuario1.nombre;

        if (amigo.estado === "aceptado") {
            contenedor.innerHTML += `
                <div class="amigo-item">${nombre}</div>
            `;
        }
    });
  }

  document.getElementById("btnAgregarAmigo").onclick = async () => {
    const codigo = document.getElementById("codigoAmigo").value.trim();

    if (!codigo.includes("#")) {
        alert("Formato inválido. Usa nombre#id");
        return;
    }

    const partes = codigo.split("#");
    const idNuevo = partes[1];

    await fetch(
        `${CONFIG.API_BASE_URL}/usuarios/${usuario.id}/agregar/${idNuevo}`,
        { method: "POST" }
    );

    alert("Solicitud enviada");
    document.getElementById("codigoAmigo").value = "";
  };

  window.aceptarSolicitud = async function(idSolicitud) {
    await fetch(
        `${CONFIG.API_BASE_URL}/usuarios/solicitud/${idSolicitud}/aceptar`,
        { method: "PUT" }
    );

    cargarSolicitudes();
    cargarAmigos();
  };





const modal = document.getElementById("editarPerfilModal");

document.getElementById("editarPerfilBtn").onclick = () => {
  modal.style.display = "flex";
};

document.getElementById("cerrarModal").onclick = () => {
  modal.style.display = "none";
};

await cargarPerfil();
await cargarSolicitudes();
await cargarAmigos();


</script>

</body>
</html>
