<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Faguáslandia</title>
</head>

<body data-theme="default">

<h2>Faguáslandia</h2>

<header>
  <nav class="menu">
      <a href="index.html">Biblioteca</a>
      <a href="tienda.html">Tienda</a>
      <a href="perfil.html">Perfil</a>
      <a href="registro.html">Registro</a>
      <a href="login.html">Iniciar sesión</a>
  </nav>
      <script type="module">
        import { getSessionUser, logout } from "./session.js";

        const menu = document.querySelector(".menu");

        const usuarioo = await getSessionUser();

        if (usuarioo) {

            // quitar login/registro
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="logoutBtn">Cerrar sesión</a>
            `;

            document.getElementById("logoutBtn").onclick = logout;

        } else {

            // usuario no logueado
            menu.innerHTML = `
                <a href="index.html">Biblioteca</a>
                <a href="tienda.html">Tienda</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Iniciar sesión</a>
            `;
        }
    </script>
</header>

<main>
  <div class="perfil">

    <div class="usuario">
      <div class="nombreUs">
        <img id="fotoPerfil" src="img/default.png">
        <h1 id="nombreUsuario">Cargando...</h1>
      </div>

      <div class="nivel">
        <h1>Nivel 7</h1>
      </div>
    </div>

    <div class="infoUsuario">
      <p><strong>Correo:</strong> <span id="emailUsuario"></span></p>
      <p><strong>Código amigo:</strong> <span id="nombreAmigo"></span>#<span id="idAmigo"></span></p>
    </div>

    <button id="editarPerfilBtn" class="btnEditar">Editar perfil</button>
  </div>
</main>

<div id="editarPerfilModal">
  <div class="modal-content">
    <h2>Editar Perfil</h2>

    <label>Nombre</label>
    <input type="text" id="editarNombre">

    <label>Correo</label>
    <input type="text" id="editarCorreo">

    <label>Foto</label>
    <input type="file" id="editarFoto">

    <button id="guardarCambios">Guardar</button>
    <button id="cerrarModal">Cancelar</button>
  </div>
</div>

<script type="module">
import CONFIG from "./config.js";

let usuario = null;

async function cargarPerfil(){

    try{

        const res = await fetch(`${CONFIG.API_BASE_URL}/auth/me`,{
            method:"GET",
            credentials:"include"
        });

        if(res.status === 401){
            window.location.href="login.html";
            return;
        }

        usuario = await res.json();

        document.getElementById("nombreUsuario").textContent = usuario.nombre;
        document.getElementById("emailUsuario").textContent = usuario.email;
        document.getElementById("nombreAmigo").textContent = usuario.nombre;
        document.getElementById("idAmigo").textContent = usuario.id;

        const fotoPerfil = document.getElementById("fotoPerfil");

        fotoPerfil.src = usuario.foto
            ? `${CONFIG.API_BASE_URL}/uploads/${usuario.foto}`
            : "img/default.png";

    }catch(error){

        console.error("Error cargando sesión:", error);
        window.location.href="login.html";

    }
}

await cargarPerfil();
</script>

</body>
</html>
