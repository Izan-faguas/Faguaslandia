<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Faguáslandia</title>
</head>
<body data-theme="default">
  <h2>Faguáslandia</h2>

  <header>
    <nav class="menu">
      <a href="index.html">Biblioteca</a>
      <a href="tienda.html">Tienda</a>
      <a href="perfil.html">Perfil</a>
      <a>Soporte</a>
      <img src="#" alt="lupa">
      <input type="text" id="nombre" placeholder="Buscar">

      <!-- Selector de tema -->
      <select id="themeSelector">
        <option value="default">🌙 Predeterminado</option>
        <option value="neon">💜 Neón</option>
        <option value="zafiro">💎 Zafiro</option>
      </select>
    </nav>
  </header>

  <main>
    <div class="perfil">

      <div class="usuario">
        <div class="nombreUs">
          <img id="fotoPerfil" src="img/default.png" alt="Foto usuario" onerror="this.src='img/default.png'">
          <h1 id="nombreUsuario">Cargando...</h1>
        </div>

        <div class="nivel">
          <h1>Nivel 7</h1>
        </div>
      </div>

      <!-- Info del usuario -->
      <div class="infoUsuario" style="margin-top: 20px; text-align:center;">
        <p><strong>Correo electrónico:</strong> <span id="emailUsuario">Cargando...</span></p>
        <p><strong>Código amigo:</strong> <span id="nombreAmigo">Cargando...</span>#<span id="idAmigo">Cargando...</span></p>
      </div>

      <button id="editarPerfilBtn" class="btnEditar">Editar perfil</button>
    </div>
  </main>

  <!-- Modal editar perfil -->
  <div id="editarPerfilModal">
      
    <div class="modal-content">

      <h2>Editar Perfil</h2>

      <label>Nombre:</label>
      <input type="text" id="editarNombre">

      <label>Correo:</label>
      <input type="text" id="editarCorreo">

      <label>Foto de perfil:</label>
      <input type="file" id="editarFoto" accept="image/*">

      <button id="guardarCambios">Guardar cambios</button>
      <button id="cerrarModal">Cancelar</button>
    </div>
  </div>

  <!-- Script cambiar tema -->
  <script>
    const selector = document.getElementById('themeSelector');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      body.dataset.theme = savedTheme;
      selector.value = savedTheme;
    }

    selector.addEventListener('change', () => {
      const theme = selector.value;
      body.dataset.theme = theme;
      localStorage.setItem('theme', theme);
    });
  </script>

  <!-- Script usuario -->
<script>
let usuario = null;

try {
    usuario = JSON.parse(localStorage.getItem("usuario"));
} catch (e) {
    console.error("Error leyendo usuario del localStorage:", e);
}

if (!usuario || !usuario.id) {
    console.warn("Usuario inválido o no encontrado. Redirigiendo al login...");
    window.location.href = "login.html";
}


const modal = document.getElementById("editarPerfilModal");
const btnEditar = document.getElementById("editarPerfilBtn");
const btnCerrar = document.getElementById("cerrarModal");
const btnGuardar = document.getElementById("guardarCambios");

// Mostrar datos
document.getElementById("nombreUsuario").textContent = usuario.nombre;
document.getElementById("emailUsuario").textContent = usuario.email;
document.getElementById("nombreAmigo").textContent = usuario.nombre;
document.getElementById("idAmigo").textContent = usuario.id;
if (usuario.foto) {
    document.getElementById("fotoPerfil").src = "http://localhost:8081/uploads/" + usuario.foto;
} else {
    document.getElementById("fotoPerfil").src = "img/default.png"; // opcional
}

btnEditar.onclick = () => {
    document.getElementById("editarNombre").value = usuario.nombre;
    document.getElementById("editarCorreo").value = usuario.email;
    modal.style.display = "flex";
};

btnCerrar.onclick = () => modal.style.display = "none";

btnGuardar.onclick = async () => {

    let nombreNuevo = document.getElementById("editarNombre").value;
    let correoNuevo = document.getElementById("editarCorreo").value;
    let fotoInput = document.getElementById("editarFoto");

    const idUsuario = usuario.id;

    // 1️⃣ Subir foto si el usuario eligió una
    let filename = usuario.foto; // mantener la anterior si no sube nada

    if (fotoInput.files.length > 0) {
        const formData = new FormData();
        formData.append("file", fotoInput.files[0]);

        let res = await fetch("http://localhost:8081/usuarios/uploadFoto", {
            method: "POST",
            body: formData
        });

        filename = await res.text();
    }

    // 2️⃣ Actualizar datos del usuario en el backend
    let body = {
        nombre: nombreNuevo,
        email: correoNuevo,
        foto: filename
    };

    await fetch(`http://localhost:8081/usuarios/actualizar/${idUsuario}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    // 3️⃣ Actualizar usuario localmente
    usuario.nombre = nombreNuevo;
    usuario.email = correoNuevo;
    usuario.foto = filename;
    localStorage.setItem("usuario", JSON.stringify(usuario));

    // 4️⃣ Actualizar datos en pantalla
    document.getElementById("nombreUsuario").textContent = usuario.nombre;
    document.getElementById("emailUsuario").textContent = usuario.email;
    const fotoPerfil = document.getElementById("fotoPerfil");

    if (usuario.foto) {
        fotoPerfil.src = "http://localhost:8081/uploads/" + usuario.foto;
    } else {
        fotoPerfil.src = "img/default.png";
    }

    fotoPerfil.onerror = () => {
        fotoPerfil.src = "img/default.png";
    };


    modal.style.display = "none";
};
</script>

</body>
</html>
