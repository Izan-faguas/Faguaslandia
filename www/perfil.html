<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Faguáslandia</title>
</head>

<body data-theme="default">

<h2>Faguáslandia</h2>

<header>
  <nav class="menu">
    <a href="index.html">Biblioteca</a>
    <a href="tienda.html">Tienda</a>
    <a href="perfil.html">Perfil</a>
    <a href="registro.html">Registro</a>

    <select id="themeSelector">
      <option value="default">🌙 Predeterminado</option>
      <option value="neon">💜 Neón</option>
      <option value="zafiro">💎 Zafiro</option>
    </select>
  </nav>
</header>

<main>
  <div class="perfil">

    <div class="usuario">
      <div class="nombreUs">
        <img id="fotoPerfil" src="img/default.png">
        <h1 id="nombreUsuario">Cargando...</h1>
      </div>

      <div class="nivel">
        <h1>Nivel 7</h1>
      </div>
    </div>

    <div class="infoUsuario">
      <p><strong>Correo:</strong> <span id="emailUsuario"></span></p>
      <p><strong>Código amigo:</strong> <span id="nombreAmigo"></span>#<span id="idAmigo"></span></p>
    </div>

    <button id="editarPerfilBtn" class="btnEditar">Editar perfil</button>
  </div>
</main>

<div id="editarPerfilModal">
  <div class="modal-content">
    <h2>Editar Perfil</h2>

    <label>Nombre</label>
    <input type="text" id="editarNombre">

    <label>Correo</label>
    <input type="text" id="editarCorreo">

    <label>Foto</label>
    <input type="file" id="editarFoto">

    <button id="guardarCambios">Guardar</button>
    <button id="cerrarModal">Cancelar</button>
  </div>
</div>

<script type="module">
import CONFIG from "./config.js";

const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario) window.location.href = "login.html";

document.getElementById("nombreUsuario").textContent = usuario.nombre;
document.getElementById("emailUsuario").textContent = usuario.email;
document.getElementById("nombreAmigo").textContent = usuario.nombre;
document.getElementById("idAmigo").textContent = usuario.id;

const fotoPerfil = document.getElementById("fotoPerfil");
fotoPerfil.src = usuario.foto
    ? `${CONFIG.API_BASE_URL}/uploads/${usuario.foto}`
    : "img/default.png";

const modal = document.getElementById("editarPerfilModal");
document.getElementById("editarPerfilBtn").onclick = () => modal.style.display = "flex";
document.getElementById("cerrarModal").onclick = () => modal.style.display = "none";

document.getElementById("guardarCambios").onclick = async () => {

    let nombre = editarNombre.value;
    let email = editarCorreo.value;
    let foto = usuario.foto;

    if (editarFoto.files.length > 0) {
        const fd = new FormData();
        fd.append("file", editarFoto.files[0]);

        const res = await fetch(`${CONFIG.API_BASE_URL}/usuarios/uploadFoto`, {
            method: "POST",
            body: fd
        });

        foto = await res.text();
    }

    await fetch(`${CONFIG.API_BASE_URL}/usuarios/actualizar/${usuario.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, email, foto })
    });

    usuario.nombre = nombre;
    usuario.email = email;
    usuario.foto = foto;
    localStorage.setItem("usuario", JSON.stringify(usuario));

    location.reload();
};
</script>

</body>
</html>
